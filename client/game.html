<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tictacdie — Partie</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>

  <header>
    <span id="player-label">Tu joues : <strong id="my-symbol"></strong></span>
    <span id="turn-indicator">Tour de <strong id="current-player"></strong></span>
  </header>

  <main>

    <!-- Board : cases générées et mises à jour dynamiquement par JS -->
    <!-- La taille varie si le joker Resize est joué (grid CSS dynamique) -->
    <div id="board"></div>

    <!-- Sélection de joker : panneau latéral -->
    <aside id="joker-panel">
      <h2>Jokers</h2>
      <!-- Chaque joker = un bouton, grisé si déjà utilisé ou si pas ton tour -->
      <div id="joker-list"></div>

      <!-- Zone d'instruction contextuelle quand un joker est sélectionné -->
      <div id="joker-prompt" hidden>
        <p id="joker-prompt-text"></p>
        <button id="joker-cancel">Annuler</button>
      </div>
    </aside>

  </main>

  <!-- Overlay de fin de partie -->
  <div id="result-overlay" hidden>
    <p id="result-message"></p>
    <button id="btn-back-lobby">Retour au lobby</button>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
