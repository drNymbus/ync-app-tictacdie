<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>TicTacDie</title>
		<link rel="stylesheet" href="game.css">
	</head>
	<body>
		<div id="app"></div>

		<!-- WS unique créé ici, puis lobby.js pilote la phase lobby.
		     À la réception de "start", lobby passe la main à game.init(ws, startMsg). -->
		<script type="module">
			import { init as lobbyInit } from "./lobby.js";
			const ws = new WebSocket(`ws://${location.host}`);
			ws.addEventListener("open", () => lobbyInit(ws));
			ws.addEventListener("error", (e) => console.error("WS error", e));
		</script>
	</body>
</html>
