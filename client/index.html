<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>TicTacDie</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
		<link rel="stylesheet" href="lobby.css">
		<link rel="stylesheet" href="game.css">
	</head>
	<body>
		<div id="app"></div>

		<!-- WS unique créé ici, puis le lobby pilote la phase lobby.
		     À la réception de "start", lobby passe la main à game.init(ws, startMsg).
		     app.js = bundle esbuild de client/lobby.ts (+ game.ts et ses modules). -->
		<script type="module">
			import { init as lobbyInit } from "./app.js";
			const ws = new WebSocket(`ws://${location.host}`);
			ws.addEventListener("open", () => lobbyInit(ws));
			ws.addEventListener("error", (e) => console.error("WS error", e));
		</script>
	</body>
</html>
